# Closed-vocabulary object detection pipeline (matches scripts/object_detection.py):
# VideoIn → FilterHuggingfaceVision (detection_type=closed-vocabulary) → Webvis
#
# Required in .env: MODEL_ID, REVISION (e.g. MODEL_ID=PekingU/rtdetr_r50vd, REVISION=main)
# Optional: THRESHOLD, DRAW_VISUALIZATION, PORT (default 8010)
# Video is mounted at /filter_example_video.mp4 (see volumes under video_in).

services:
  video_in:
    image: plainsightai/openfilter-video-inopenfilter-huggingface-vision:0.4.4
    environment:
      LOG_LEVEL: ${LOG_LEVELopenfilter-huggingface-vision:0.4.4}
      FILTER_ID: VideoIn
      FILTER_SOURCES: file:///filter_example_video.mp4!loop
      FILTER_OUTPUTS: tcp://*openfilter-huggingface-vision:0.4.4
    volumes:
      - ./filter_example_video.mp4:/filter_example_video.mp4openfilter-huggingface-vision:0.4.4
      - ./cache:/app/cache
      - ./telemetry:/app/telemetry
    networks:
      - filter-network

  filter_huggingface_vision:
    # v0.4.1 was PyPI-only; compose tracks published images (0.4.0 → 0.4.2).
    image: plainsightai/openfilter-huggingface-vision:0.4.4
    environment:
      LOG_LEVEL: ${LOG_LEVELopenfilter-huggingface-vision:0.4.4}
      FILTER_ID: filter_huggingface_vision
      FILTER_SOURCES: tcp://video_inopenfilter-huggingface-vision:0.4.4
      FILTER_OUTPUTS: tcp://*openfilter-huggingface-vision:0.4.4
      FILTER_MQ_LOG: pretty
      # Required (set in .env or here)
      FILTER_MODEL_ID: ${MODEL_IDopenfilter-huggingface-vision:0.4.4/rtdetr_r50vd}
      FILTER_REVISION: ${REVISIONopenfilter-huggingface-vision:0.4.4}
      # Optional
      FILTER_THRESHOLD: ${THRESHOLDopenfilter-huggingface-vision:0.4.4}
      FILTER_DRAW_VISUALIZATION: ${DRAW_VISUALIZATIONopenfilter-huggingface-vision:0.4.4}
      FILTER_VISUALIZATION_TOPIC: viz

    # WARNING! WARNING! WARNING! If you do not have an Nvidia GPU then comment this section out!!!
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # WARNING! WARNING! WARNING! If you do not have an Nvidia GPU then comment this section out!!!

    volumes:
      - ./cache:/app/cache
      - ./telemetry:/app/telemetry
    networks:
      - filter-network

  webvis:
    image: plainsightai/openfilter-webvisopenfilter-huggingface-vision:0.4.4
    environment:
      LOG_LEVEL: ${LOG_LEVELopenfilter-huggingface-vision:0.4.4}
      FILTER_ID: webvis
      # Subscribe to main and viz (detection overlay) from filter
      FILTER_SOURCES: tcp://filter_huggingface_visionopenfilter-huggingface-vision:0.4.4;main,tcp://filter_huggingface_visionopenfilter-huggingface-vision:0.4.4;viz
      FILTER_PORT: ${PORTopenfilter-huggingface-vision:0.4.4}
    volumes:
      - ./cache:/app/cache
      - ./telemetry:/app/telemetry
    ports:
      - "${PORTopenfilter-huggingface-vision:0.4.4}:${PORTopenfilter-huggingface-vision:0.4.4}"
    networks:
      - filter-network

networks:
  filter-network:

# Object detection pipeline (matches scripts/object_detection_pipeline.py):
# VideoIn → FilterHuggingfaceVision (Object Detection) → Webvis
#
# Required: set MODEL_ID and REVISION (e.g. in .env):
#   MODEL_ID=PekingU/rtdetr_r50vd
#   REVISION=main
# Optional: VIDEO_PATH (file inside container), THRESHOLD, DRAW_VISUALIZATION, PORT

services:
  video_in:
    image: us-west1-docker.pkg.dev/plainsightai-prod/oci/openfilter/video_in:v0.1.9
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-}
      FILTER_ID: VideoIn
      FILTER_SOURCES: file:///filter_example_video.mp4!loop
      FILTER_OUTPUTS: tcp://*:5550
    volumes:
      - ./filter_example_video.mp4:/filter_example_video.mp4:ro
      - ./cache:/app/cache
      - ./telemetry:/app/telemetry
    networks:
      - filter-network

  filter_huggingface_vision:
    image: us-west1-docker.pkg.dev/plainsightai-prod/oci/filter-huggingface-vision:v0.1.0
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-}
      FILTER_ID: filter_huggingface_vision
      FILTER_SOURCES: tcp://video_in:5550
      FILTER_OUTPUTS: tcp://*:5552
      FILTER_MQ_LOG: pretty
      # Required (set in .env or here)
      FILTER_MODEL_ID: ${MODEL_ID:-PekingU/rtdetr_r50vd}
      FILTER_REVISION: ${REVISION:-main}
      # Optional
      FILTER_THRESHOLD: ${THRESHOLD:-0.3}
      FILTER_DRAW_VISUALIZATION: ${DRAW_VISUALIZATION:-true}
      FILTER_VISUALIZATION_TOPIC: viz

    # WARNING! WARNING! WARNING! If you do not have an Nvidia GPU then comment this section out!!!
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # WARNING! WARNING! WARNING! If you do not have an Nvidia GPU then comment this section out!!!

    volumes:
      - ./cache:/app/cache
      - ./telemetry:/app/telemetry
    networks:
      - filter-network

  webvis:
    image: us-west1-docker.pkg.dev/plainsightai-prod/oci/openfilter/webvis:v0.1.9
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-}
      FILTER_ID: webvis
      # Subscribe to main and viz (detection overlay) from filter
      FILTER_SOURCES: tcp://filter_huggingface_vision:5552;main,tcp://filter_huggingface_vision:5552;viz
      FILTER_PORT: ${PORT:-8010}
    volumes:
      - ./cache:/app/cache
      - ./telemetry:/app/telemetry
    ports:
      - "${PORT:-8010}:${PORT:-8010}"
    networks:
      - filter-network

networks:
  filter-network:

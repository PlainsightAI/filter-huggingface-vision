# Closed-vocabulary object detection pipeline (matches scripts/object_detection.py):
# VideoIn → FilterHuggingfaceVision (detection_type=closed-vocabulary) → Webvis
#
# Required in .env: MODEL_ID, REVISION (e.g. MODEL_ID=PekingU/rtdetr_r50vd, REVISION=main)
# Optional: THRESHOLD, DRAW_VISUALIZATION, PORT (default 8010)
# Video is mounted at /filter_example_video.mp4 (see volumes under video_in).

services:
  video_in:
    image: plainsightai/openfilter-video-in:0.1.27
    env_file:
      - .env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-}
      FILTER_ID: VideoIn
      # File: set VIDEO_INPUT=file:///filter_example_video.mp4!sync (default). For RTSP set VIDEO_INPUT=rtsp://...
      FILTER_SOURCES: ${VIDEO_INPUT:-file:///filter_example_video.mp4!resize=960x540!sync}
      FILTER_FPS: ${FILTER_FPS:-}
      FILTER_OUTPUTS: tcp://*:5550
    volumes:
      - ${VIDEO_PATH:-./filter_example_video.mp4}:/filter_example_video.mp4:ro
      - ./cache:/app/cache
      - ./telemetry:/app/telemetry
    networks:
      - filter-network

  filter_huggingface_vision:
    # compose tracks the latest published image; bump alongside VERSION on release.
    image: plainsightai/openfilter-huggingface-vision:0.4.10
    env_file:
      - .env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-}
      FILTER_ID: filter_huggingface_vision
      FILTER_SOURCES: tcp://video_in:5550
      FILTER_OUTPUTS: tcp://*:5552
      # Required (set in .env or here)
      FILTER_MODEL_ID: ${MODEL_ID:-PekingU/rtdetr_r50vd}
      FILTER_REVISION: ${REVISION:-main}
      # Optional
      FILTER_DETECTION_TYPE: ${FILTER_DETECTION_TYPE:-closed-vocabulary}
      FILTER_THRESHOLD: ${THRESHOLD:-0.3}
      FILTER_MAX_DETECTIONS: ${FILTER_MAX_DETECTIONS:-100}
      FILTER_TOP_K: ${TOP_K:-5}
      # For open-vocabulary* detection types, pass JSON list-of-lists, e.g. [["cup","bottle","laptop"]]
      FILTER_TEXT_LABELS: ${FILTER_TEXT_LABELS:-}
      FILTER_DRAW_VISUALIZATION: ${DRAW_VISUALIZATION:-true}
      FILTER_VISUALIZATION_TOPIC: viz
      FILTER_DEVICE: ${FILTER_DEVICE:-cuda}

    # WARNING! WARNING! WARNING! If you do not have an Nvidia GPU then comment this section out!!!
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # WARNING! WARNING! WARNING! If you do not have an Nvidia GPU then comment this section out!!!

    volumes:
      - ./cache:/app/cache
      - ./telemetry:/app/telemetry
    networks:
      - filter-network

  webvis:
    image: plainsightai/openfilter-webvis:0.1.27
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-}
      FILTER_ID: webvis
      # Subscribe to main and viz (detection overlay) from filter
      FILTER_SOURCES: tcp://filter_huggingface_vision:5552;main,tcp://filter_huggingface_vision:5552;viz
      FILTER_PORT: ${PORT:-8010}
    volumes:
      - ./cache:/app/cache
      - ./telemetry:/app/telemetry
    ports:
      - "${PORT:-8010}:${PORT:-8010}"
    networks:
      - filter-network

networks:
  filter-network:
